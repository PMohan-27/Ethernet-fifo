# Tiny Tapeout project information
project:
  title:        "Ethernet_FIFO"      # Project title
  author:       "Parasinder Mohan"      # Your name
  discord:      "coolp"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "fifo buffer for ethrenet timestamps"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_buffer_pmohan"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "buffer_top.v"
    - "fifo_sync.v"
    - "memory.v"
    - "counter.v"


# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "iw_data[0]"
  ui[1]: "iw_data[1]"
  ui[2]: "iw_data[2]"
  ui[3]: "iw_data[3]"
  ui[4]: "iw_data[4]"
  ui[5]: "iw_data[5]"
  ui[6]: "iw_data[6]"
  ui[7]: "iw_data[7]"

  # Outputs
  uo[0]: "ow_data[0]"
  uo[1]: "ow_data[1]"
  uo[2]: "ow_data[2]"
  uo[3]: "ow_data[3]"
  uo[4]: "ow_data[4]"
  uo[5]: "ow_data[5]"
  uo[6]: "ow_data[6]"
  uo[7]: "ow_data[7]"

  # Bidirectional pins
  uio[0]: "i_write"
  uio[1]: "i_read"
  uio[2]: "ow_full"
  uio[3]: "ow_empty"
  uio[4]: "or_timetag[0]"
  uio[5]: "or_timetag[1]"
  uio[6]: "or_timetag[2]"
  uio[7]: "or_timetag[3]"

# Do not change!
yaml_version: 6
